<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">LATTICE Architecture</text>
  <text x="450" y="62" text-anchor="middle" fill="#94a3b8" font-size="13">Accountability Layer for Multi-Agent AI Systems</text>

  <!-- Top: Your Agents -->
  <rect x="150" y="85" width="600" height="60" rx="10" fill="#334155" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="112" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">YOUR AGENTS</text>
  <text x="450" y="132" text-anchor="middle" fill="#94a3b8" font-size="11">CrewAI / LangGraph / AutoGen / Raw Python / Any Framework</text>

  <!-- Arrow down -->
  <path d="M450 145 L450 175" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="530" y="165" fill="#60a5fa" font-size="10">store.agent() / .claim() / @track</text>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>

  <!-- LATTICE CORE box -->
  <rect x="50" y="180" width="800" height="290" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="205" fill="#60a5fa" font-size="13" font-weight="700">LATTICE CORE</text>

  <!-- Row 1: Three main components -->
  <!-- Claim DAG -->
  <rect x="80" y="220" width="220" height="90" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="190" y="255" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Claim DAG</text>
  <text x="190" y="275" text-anchor="middle" fill="#bfdbfe" font-size="11">Content-Addressed</text>
  <text x="190" y="292" text-anchor="middle" fill="#bfdbfe" font-size="11">SQLite Storage</text>

  <!-- Evidence Store -->
  <rect x="340" y="220" width="220" height="90" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="450" y="255" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Evidence Store</text>
  <text x="450" y="275" text-anchor="middle" fill="#bbf7d0" font-size="11">SHA-256 Hashed Blobs</text>
  <text x="450" y="292" text-anchor="middle" fill="#bbf7d0" font-size="11">Immutable Raw Data</text>

  <!-- Agent Registry -->
  <rect x="600" y="220" width="220" height="90" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="710" y="255" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Agent Registry</text>
  <text x="710" y="275" text-anchor="middle" fill="#e9d5ff" font-size="11">Ed25519 Keypairs</text>
  <text x="710" y="292" text-anchor="middle" fill="#e9d5ff" font-size="11">Identity + Signing</text>

  <!-- Row 2: Operations -->
  <!-- Trace + Audit -->
  <rect x="80" y="340" width="350" height="70" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="255" y="368" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">DAG Operations</text>
  <text x="255" y="390" text-anchor="middle" fill="#94a3b8" font-size="11">Trace / Audit / Stats / Export</text>

  <!-- Verify -->
  <rect x="470" y="340" width="350" height="70" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="645" y="368" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Signature Verification</text>
  <text x="645" y="390" text-anchor="middle" fill="#94a3b8" font-size="11">Ed25519 Verify / Tamper Detection</text>

  <!-- Row 3: @track -->
  <rect x="80" y="430" width="740" height="25" rx="6" fill="#334155" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="447" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">@track decorator — auto-instruments any Python function into the DAG</text>

  <!-- Bottom outputs -->
  <!-- CLI -->
  <rect x="120" y="500" width="280" height="65" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="260" y="527" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">CLI (Rich Terminal)</text>
  <text x="260" y="547" text-anchor="middle" fill="#fef3c7" font-size="11">lattice trace / audit / verify / stats</text>

  <!-- JSON Export -->
  <rect x="500" y="500" width="280" height="65" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="527" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">JSON Export</text>
  <text x="640" y="547" text-anchor="middle" fill="#94a3b8" font-size="11">investigation.json / Archival</text>

  <!-- Arrows to outputs -->
  <path d="M350 470 L260 500" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <path d="M550 470 L640 500" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f59e0b"/></marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#475569"/></marker>
  </defs>

  <!-- Footer -->
  <text x="450" y="600" text-anchor="middle" fill="#64748b" font-size="10">Pure Python + SQLite + Ed25519 — Zero cloud dependencies — MIT License</text>
</svg>
